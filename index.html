<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雾霾探测APP</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>

        :root { --glass: rgba(255, 255, 255, 0.3); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: "PingFang SC", sans-serif;
            min-height: 100vh;
            transition: background 1s ease; 
            background: #f0f4f8; 
        }

        /* 动态背景主题 */
        body.sunny {background: radial-gradient(circle at 80% 15%, #fff9e6 0%, #ffedbc 20%, #4facfe 100%);
            background-attachment: fixed;}
        body.cloudy { background: linear-gradient(180deg, 
        #fff5e6 0%,   /* 顶部的淡淡阳光暖意 */
        #f0f4f8 40%,  /* 柔软的白云色 */
        #a1c4fd 100%  /* 底部的天空蓝 */
    );
    background-attachment: fixed;}
        body.cloudy::after {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at 20% 30%, rgba(255,255,255,0.8) 0%, transparent 50%);
    pointer-events: none;
    z-index: -1;
}
        body.rainy { background: linear-gradient(180deg, #485563 0%, #29323c 100%); }
        body.snowy { background: linear-gradient(180deg, #e6e9f0 0%, #eef1f5 100%); }

        .container { width: 100%; padding: 0.3rem; }

        /* 全屏卡片样式 */
        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 0.3rem;
            padding: 0.4rem;
            margin-bottom: 0.3rem;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .card-title {
            font-size: 0.32rem; font-weight: bold; margin-bottom: 0.3rem;
            border-left: 0.1rem solid #007AFF; padding-left: 0.2rem;
        }

        /* 搜索框样式优化 */
        .search-bar { display: flex; gap: 0.15rem; margin-bottom: 0.3rem; }
        .search-bar input { 
            flex: 1; padding: 0.2rem; border-radius: 0.15rem; border: none; 
            background: var(--glass); font-size: 0.28rem;
        }
        .search-bar button { 
            padding: 0 0.4rem; border-radius: 0.15rem; border: none;
            background: #007AFF; color: white; font-weight: bold;
        }

        /* 污染物数字优化 */
        .pollutants-container {
            display: flex; justify-content: space-between;
            margin-top: 0.4rem; border-top: 1px solid rgba(0,0,0,0.08); padding-top: 0.3rem;
        }
        .pollutant-item { flex: 1; text-align: center; }
        .p-label { display: block; font-size: 0.24rem; color: #64748b; margin-bottom: 0.08rem; }
        .p-value { font-size: 0.36rem; font-weight: 800; color: #1e293b; }

        /* 样式细节 */
        .temp-row { display: flex; justify-content: space-between; align-items: center; }
        .temp-big { font-size: 1rem; font-weight: 800; color: #1e293b; }
        .aqi-big { font-size: 0.9rem; font-weight: 800; }
        .advice-tag { padding: 0.08rem 0.2rem; border-radius: 0.12rem; font-size: 0.26rem; font-weight: bold; }
        #chart-main { width: 100%; height: 5rem; }
        .header { text-align: center; padding: 0.4rem 0; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <h1 id="cityDisplay" style="font-size: 0.55rem;">加载中...</h1>
        <p id="updateTime" style="opacity: 0.8; font-size: 0.26rem; margin-top: 0.1rem;">正在获取实时数据</p>
    </header>

    <div class="search-bar">
        <input type="text" id="cityInput" placeholder="输入城市名称（如：西安）">
        <button onclick="handleSearch()">查询</button>
    </div>

    <section class="card">
        <div class="card-title">实时天气</div>
        <div class="temp-row">
            <div>
                <div class="temp-big"><span id="curTemp">--</span><span style="font-size: 0.4rem;">°</span></div>
                <div style="font-size: 0.26rem; color: #64748b;">湿度 <span id="curHumid">--</span>%</div>
            </div>
            <div style="text-align: right;">
                <div id="wText" style="font-size: 0.36rem; font-weight: bold;">--</div>
                <div id="windInfo" style="font-size: 0.24rem; color: #64748b; margin-top: 0.1rem;">--</div>
            </div>
        </div>
    </section>

    <section class="card">
        <div class="card-title">空气质量 AQI</div>
        <div style="display: flex; align-items: baseline; gap: 0.2rem; margin-bottom: 0.1rem;">
            <div id="aqiVal" class="aqi-big">--</div>
            <div id="aqiTag" class="advice-tag">--</div>
        </div>
        
        <div class="pollutants-container">
            <div class="pollutant-item">
                <span class="p-label">PM2.5</span>
                <span id="pm25" class="p-value">--</span>
            </div>
            <div class="pollutant-item" style="border-left: 1px solid rgba(0,0,0,0.05); border-right: 1px solid rgba(0,0,0,0.05);">
                <span class="p-label">PM10</span>
                <span id="pm10" class="p-value">--</span>
            </div>
            <div class="pollutant-item">
                <span class="p-label">NO₂</span>
                <span id="no2" class="p-value">--</span>
            </div>
        </div>
        <p id="adviceText" style="margin-top: 0.3rem; font-size: 0.24rem; line-height: 1.5;">--</p>
    </section>

    <section class="card">
        <div class="card-title">24小时温湿度趋势</div>
        <div id="chart-main"></div>
    </section>
</div>

<script>
    
    let myChart = null;

    // 1. 基础适配
    function initRem() {
        const width = document.documentElement.clientWidth;
        document.documentElement.style.fontSize = (width / 7.5) + 'px';
    }
    window.onresize = () => { initRem(); myChart && myChart.resize(); };
    initRem();

    // 2. 数据获取逻辑 (Open-Meteo API)
    async function fetchWeatherData(cityName = "西安") {
        try {
            // 地理编码
            const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=1&language=zh`);
            const geoData = await geoRes.json();
            if (!geoData.results) return alert("未找到该城市");
            const { latitude: lat, longitude: lon, name } = geoData.results[0];

            // 并行获取天气和空气质量
            const [wRes, aRes] = await Promise.all([
                fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,relativehumidity_2m`),
                fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi,pm2_5,pm10,nitrogen_dioxide`)
            ]);

            const weatherData = await wRes.json();
            const airData = await aRes.json();

            
            updateVisualPart(name, weatherData, airData);
        } catch (err) {
            console.error("数据加载失败", err);
        }
    }

    // 3. 视觉渲染调度中心
    function updateVisualPart(name, w, a) {
        const current = w.current_weather;
        const air = a.current;

        // 更新文字
        document.getElementById('cityDisplay').innerText = name;
        document.getElementById('curTemp').innerText = Math.round(current.temperature);
        document.getElementById('curHumid').innerText = w.hourly.relativehumidity_2m[new Date().getHours()];
        document.getElementById('windInfo').innerText = `风速 ${current.windspeed} km/h`;
        document.getElementById('updateTime').innerText = `最后更新: ${new Date().toLocaleTimeString()}`;

        // (1) 背景与状态切换
        updateBackground(current.weathercode);

        // (2) AQI 与污染物显示 
        updateAQISection(air);

        // (3) 24小时图表
        renderFullChart(w.hourly);
    }

    // 背景切换逻辑
    function updateBackground(code) {
        const body = document.body;
        body.className = ''; 
        let text = "☁️多云";

        if (code === 0) { body.classList.add('sunny'); text = "☀️晴朗"; }
        else if (code <= 3) { body.classList.add('cloudy'); text = "☁️多云"; }
        else if (code >= 51 && code <= 67) { body.classList.add('rainy'); text = "🌧️有雨"; }
        else if (code >= 71) { body.classList.add('snowy'); text = "❄️有雪"; }
        else { body.classList.add('cloudy'); }
        
        document.getElementById('wText').innerText = text;
    }

    // AQI 区域更新
    function updateAQISection(air) {
        const aqi = Math.round(air.us_aqi);
        const aqiVal = document.getElementById('aqiVal');
        const aqiTag = document.getElementById('aqiTag');
        const adviceText = document.getElementById('adviceText');

        aqiVal.innerText = aqi;
        document.getElementById('pm25').innerText = air.pm2_5;
        document.getElementById('pm10').innerText = air.pm10;
        document.getElementById('no2').innerText = air.nitrogen_dioxide;

        if (aqi <= 50) {
            aqiVal.style.color = "#10b981"; aqiTag.innerText = "优";
            aqiTag.style.cssText = "background:#ecfdf5; color:#10b981";
            adviceText.innerText = "空气很好，适合户外运动。";
        } else if (aqi <= 100) {
            aqiVal.style.color = "#f59e0b"; aqiTag.innerText = "良";
            aqiTag.style.cssText = "background:#fffbeb; color:#f59e0b";
            adviceText.innerText = "质量尚可，部分敏感人群注意。";
        } else {
            aqiVal.style.color = "#ef4444"; aqiTag.innerText = "污染";
            aqiTag.style.cssText = "background:#fef2f2; color:#ef4444";
            adviceText.innerText = "空气不佳，建议佩戴口罩，减少外出。";
        }
    }

    // 图表重绘逻辑
    function renderFullChart(hourly) {
        if (!myChart) myChart = echarts.init(document.getElementById('chart-main'));
        
        const hours = hourly.time.map(t => t.split('T')[1]);

        myChart.setOption({
            grid: { top: '15%', left: '10%', right: '10%', bottom: '15%' },
            tooltip: { trigger: 'axis', confine: true },
            legend: { data: ['温度', '湿度'], top: '0%' },
            xAxis: {
                type: 'category',
                boundaryGap: false,
                data: hours.slice(0, 24),
                axisLabel: { interval: 3, fontSize: 10, color: '#94a3b8' }
            },
            yAxis: [
                { type: 'value', name: '°C', axisLabel: { fontSize: 10 } },
                { type: 'value', name: '%', max: 100, axisLabel: { fontSize: 10 }, splitLine: {show: false} }
            ],
            series: [
                {
                    name: '温度', type: 'line', smooth: true,
                    data: hourly.temperature_2m.slice(0, 24),
                    color: '#007AFF',
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(0, 122, 255, 0.3)' },
                            { offset: 1, color: 'rgba(0, 122, 255, 0)' }
                        ])
                    }
                },
                {
                    name: '湿度', type: 'line', yAxisIndex: 1, smooth: true,
                    data: hourly.relativehumidity_2m.slice(0, 24),
                    color: '#f59e0b', lineStyle: { type: 'dashed', width: 2 }
                }
            ]
        });
    }

    function handleSearch() {
        const val = document.getElementById('cityInput').value;
        if (val) fetchWeatherData(val);
    }

    // 初始加载
    fetchWeatherData("西安");

</script>
</body>
</html>
